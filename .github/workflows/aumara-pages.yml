name: Deploy AUMARA site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'aumara-site/**'
      - '.github/workflows/aumara-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload AUMARA static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./aumara-site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
